<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>RPS Battle</title>
</head>
<body>

    <nav class="top-navbar">

        <h1>BATTLERPS</h1>
        
         <button class="mode-btn">
            Dark Mode
         </button>

    </nav>

    <section class="scoreboard">
        <div class="score-card wins">
            <p>WINS</p>
            <h2>12</h2>
        </div>

        <div class="score-card losses">
            <p>LOSSES</p>
            <h2>10</h2>
        </div>

        <div class="score-card draws">
            <p>DRAWS</p>
            <h2>4</h2>
        </div>

    </section>

    <section class="battle-cont">
        <div class="player-card">
            <div class="card-title">
                YOU
            </div>

            <div class="card-content">
                
            </div>
        </div>

        <button class="vs-cont">
            VS
        </button>

        <div class="opponent-card">
            <div class="card-title">
                AI
            </div>

            <div class="card-content">

            </div>
        </div>
    </section>

    <section class="start-area">
        <button class="start-btn">START</button>

        <div class="buttons-cont">

  <div class="choice">
    <button class="choice-btn rock">
      <img src="rock icon.png" alt="rock">
    </button>
    <span>Rock</span>
  </div>

  <div class="choice">
    <button class="choice-btn paper">
      <img src="paper icon.png" alt="paper">
    </button>
    <span>Paper</span>
  </div>

  <div class="choice">
    <button class="choice-btn scissors">
      <img src="scissors icon.png" alt="scissors">
    </button>
    <span>Scissors</span>
  </div>

</div>

    </section>

    <nav class="bottom-navbar">
        <button class="nav-btn active" >
            <span>🏆</span>
            <p>Arena</p>
        </button>

        <button class="nav-btn">
            <span>🏆</span>
            <p>Ranking</p>
        </button>

        <button class="nav-btn">
            <span>ℹ️</span>
            <p>Rules</p>
        </button>
    </nav>

    <script src="app.js"></script>
</body>
</html>
